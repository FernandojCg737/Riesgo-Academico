services:
  - type: web
    name: riesgo-academico-backend
    env: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        value: https://riesgo-academico-frontend.onrender.com
      - key: GEMINI_API_KEY
        sync: false
      - key: MODEL_STORAGE_PATH
        value: /app/models_storage
      - key: REPORTS_STORAGE_PATH
        value: /app/reports_storage
      - key: RAW_DATA_PATH
        value: /app/data/raw

  - type: web
    name: riesgo-academico-frontend
    env: docker
    plan: free
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://riesgo-academico-backend.onrender.com
