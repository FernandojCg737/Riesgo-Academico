databases:
  - name: riesgo-academico-db
    plan: free
    databaseName: academic_risk_db
    user: academic_user

services:
  - type: web
    name: riesgo-academico-backend
    env: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health
    startCommand: "alembic upgrade head && uvicorn src.api.main:app --host 0.0.0.0 --port 8000"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: riesgo-academico-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://riesgo-academico-frontend.onrender.com
      - key: GEMINI_API_KEY
        sync: false
      - key: MODEL_STORAGE_PATH
        value: /app/models_storage
      - key: REPORTS_STORAGE_PATH
        value: /app/reports_storage
      - key: RAW_DATA_PATH
        value: /app/data/raw

  - type: web
    name: riesgo-academico-frontend
    env: docker
    plan: free
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://riesgo-academico-backend.onrender.com
